name: Build Capacitor APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install dependencies
      run: npm install
      
    - name: Install Capacitor CLI
      run: npm install @capacitor/cli @capacitor/core @capacitor/android
      
    - name: Sync Capacitor
      run: npx cap sync android
      
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        # Esto ayuda a evitar que Gradle use una caché potencialmente corrupta
        cache-read-only: false 
      
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
      
    - name: Build with Gradle
      # Ajustes críticos añadidos:
      # --max-workers=1: Evita conflictos de escritura en archivos JAR
      # --refresh-dependencies: Obliga a re-descargar si hay archivos corruptos
      # --stacktrace: Útil para identificar si el fallo es de red o de sistema
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon --max-workers=1 --refresh-dependencies --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
